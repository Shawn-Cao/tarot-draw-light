<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tarot Draw Icon Generator</title>
</head>
<body>
    <h1>Tarot Draw Icon Generator</h1>
    <p>Open this file in a browser and the icons will be generated automatically.</p>
    <canvas id="canvas192" width="192" height="192" style="border: 1px solid #ccc; margin: 10px;"></canvas>
    <canvas id="canvas512" width="512" height="512" style="border: 1px solid #ccc; margin: 10px;"></canvas>
    <div id="downloads"></div>

    <script>
        function drawStar(ctx, cx, cy, outerR, innerR) {
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
                const angle = Math.PI / 2 + i * Math.PI / 5;
                const r = i % 2 === 0 ? outerR : innerR;
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
        }

        function createIcon(canvas, size) {
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, size, size * 0.8);
            gradient.addColorStop(0, '#1a1030');
            gradient.addColorStop(1, '#2d1b4e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            const cx = size / 2;
            const cy = size / 2;
            const cardW = size * 0.35;
            const cardH = size * 0.55;
            const radius = size * 0.03;

            ctx.fillStyle = '#d4af37';
            ctx.strokeStyle = '#f5e6c8';
            ctx.lineWidth = size * 0.012;
            ctx.beginPath();
            ctx.roundRect(cx - cardW / 2, cy - cardH / 2, cardW, cardH, radius);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#1a1030';
            drawStar(ctx, cx, cy, size * 0.08, size * 0.035);
            ctx.fill();

            return canvas;
        }

        const canvas192 = document.getElementById('canvas192');
        const canvas512 = document.getElementById('canvas512');

        createIcon(canvas192, 192);
        createIcon(canvas512, 512);

        const downloads = document.getElementById('downloads');

        canvas192.toBlob((blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'icon-192.png';
            a.textContent = 'Download icon-192.png';
            a.style.display = 'block';
            a.style.margin = '10px';
            downloads.appendChild(a);
        });

        canvas512.toBlob((blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'icon-512.png';
            a.textContent = 'Download icon-512.png';
            a.style.display = 'block';
            a.style.margin = '10px';
            downloads.appendChild(a);
        });
    </script>
</body>
</html>
