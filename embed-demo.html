<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Draw Embed Demo</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f4f0ea;
            color: #1a1030;
        }

        main {
            max-width: 40rem;
            margin: 0 auto;
            padding: 2rem 1rem 3rem;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .frame-wrap {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(26, 16, 48, 0.15);
            background: #1a1030;
        }

        iframe {
            display: block;
            width: 100%;
            border: 0;
            min-height: 640px;
        }

        pre {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #fff;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 0.85rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main>
        <h1>Tarot Draw — iframe embed</h1>
        <p>This page embeds the widget and auto-resizes the iframe height.</p>

        <div class="frame-wrap">
            <iframe
                id="tarot-embed"
                src="embed.html"
                title="Tarot Draw"
                loading="lazy"
                allow="fullscreen"
            ></iframe>
        </div>

        <pre id="snippet"></pre>
    </main>

    <script>
        const iframe = document.getElementById('tarot-embed');
        const embedUrl = new URL('embed.html', window.location.href).href;

        document.getElementById('snippet').textContent =
`<iframe
  src="${embedUrl}"
  title="Tarot Draw"
  style="width:100%;border:0;min-height:640px"
  loading="lazy"
></iframe>

<script>
  window.addEventListener('message', (event) => {
    if (event.data?.type !== 'tarot-draw-light:resize') return;
    const frame = document.querySelector('iframe[title="Tarot Draw"]');
    if (frame) frame.style.height = event.data.height + 'px';
  });
<\/script>`;

        window.addEventListener('message', (event) => {
            if (event.data?.type !== 'tarot-draw-light:resize') {
                return;
            }
            iframe.style.height = `${event.data.height}px`;
        });
    </script>
</body>
</html>
